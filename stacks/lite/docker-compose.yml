# Unbound recursive resolver — AdGuard Home forwards to this on 127.0.0.1:5335
# so DNS queries resolve from the root servers instead of an upstream provider.
name: lite

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "2"

services:
  unbound:
    image: klutchell/unbound:latest
    container_name: unbound
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 32m
    cpus: "0.50"
    ports:
      - "127.0.0.1:5335:53/udp"
      - "127.0.0.1:5335:53/tcp"
    volumes:
      - ./unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    security_opt:
      - no-new-privileges:true
    logging: *logging
    healthcheck:
      test: ["CMD", "drill", "@127.0.0.1", "cloudflare.com"]
      interval: 30s
      timeout: 5s
      retries: 3
