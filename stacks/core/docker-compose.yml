services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    network_mode: host
    restart: unless-stopped
    volumes:
      - /opt/stacks/adguard/work:/opt/adguardhome/work
      - /opt/stacks/adguard/conf:/opt/adguardhome/conf

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=192.168.1.213:3001,localhost:3001,100.112.109.117:3001,home.dobasmp.net
    volumes:
      - /opt/stacks/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
