# Core stack: DNS blocking, dashboard, uptime, logs, metrics.
# Sanitized reference — replace LAN/Tailscale IPs and the Beszel key.
services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    network_mode: host
    restart: unless-stopped
    volumes:
      - /opt/stacks/adguard/work:/opt/adguardhome/work
      - /opt/stacks/adguard/conf:/opt/adguardhome/conf

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # Add every host/IP the dashboard is reached from.
      - HOMEPAGE_ALLOWED_HOSTS=192.168.1.10:3001,localhost:3001,home.example.com
    volumes:
      - /opt/stacks/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - /opt/stacks/uptime-kuma:/app/data

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "3003:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - "3004:8090"
    volumes:
      - /opt/stacks/beszel/data:/beszel_data

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      - LISTEN=45876
      - KEY=<BESZEL_PUBLIC_KEY>   # paste the hub's ssh-ed25519 public key
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
