{
  "device.node_id": "homelab2-canary",
  "ip.ignorelist": [
    "127.0.0.1",
    "::1"
  ],
  "logtype.ignorelist": [],
  "git.enabled": false,
  "ftp.enabled": true,
  "ftp.port": 2121,
  "ftp.banner": "FTP server ready",
  "http.enabled": true,
  "http.port": 8081,
  "http.banner": "Apache/2.4.41 (Ubuntu)",
  "http.skin": "nasLogin",
  "https.enabled": false,
  "httpproxy.enabled": false,
  "ssh.enabled": true,
  "ssh.port": 2222,
  "ssh.version": "SSH-2.0-OpenSSH_7.9p1 Debian-10+deb10u2",
  "telnet.enabled": true,
  "telnet.port": 2323,
  "telnet.banner": "Ubuntu 18.04.6 LTS",
  "telnet.honeycreds": [
    {
      "username": "admin",
      "password": "admin"
    },
    {
      "username": "admin",
      "password": "password"
    }
  ],
  "mysql.enabled": true,
  "mysql.port": 3306,
  "mysql.banner": "5.7.38-0ubuntu0.18.04.1",
  "redis.enabled": true,
  "redis.port": 6379,
  "rdp.enabled": true,
  "rdp.port": 3389,
  "vnc.enabled": true,
  "vnc.port": 5900,
  "smb.enabled": false,
  "snmp.enabled": false,
  "ntp.enabled": false,
  "tftp.enabled": false,
  "sip.enabled": false,
  "mssql.enabled": false,
  "llmnr.enabled": false,
  "portscan.enabled": false,
  "tcpbanner.enabled": false,
  "logger": {
    "class": "PyLogger",
    "kwargs": {
      "formatters": {
        "plain": {
          "format": "%(message)s"
        }
      },
      "handlers": {
        "console": {
          "class": "logging.StreamHandler",
          "stream": "ext://sys.stdout"
        },
        "file": {
          "class": "logging.FileHandler",
          "filename": "/var/tmp/opencanary.log"
        },
        "Webhook": {
          "class": "opencanary.logger.WebhookHandler",
          "url": "http://172.17.0.1:9055/alert",
          "method": "POST",
          "data": {
            "message": "%(message)s"
          },
          "headers": {
            "Content-Type": "application/json"
          },
          "status_code": 200
        }
      }
    }
  }
}