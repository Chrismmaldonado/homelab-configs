services:
  database:
    image: mariadb:11.4
    container_name: pterodactyl-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /opt/stacks/pterodactyl/data/database:/var/lib/mysql
    environment:
      MYSQL_DATABASE: panel
      MYSQL_USER: pterodactyl
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - pterodactyl
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 20

  cache:
    image: redis:7-alpine
    container_name: pterodactyl-redis
    restart: unless-stopped
    networks:
      - pterodactyl

  panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: pterodactyl-panel
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_started
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - /opt/stacks/pterodactyl/data/var:/app/var
      - /opt/stacks/pterodactyl/data/nginx:/etc/nginx/http.d
      - /opt/stacks/pterodactyl/data/certs:/etc/letsencrypt
      - /opt/stacks/pterodactyl/data/logs:/app/storage/logs
    environment:
      APP_URL: ${APP_URL}
      APP_TIMEZONE: America/Chicago
      APP_SERVICE_AUTHOR: admin@dobasmp.net
      APP_ENV: production
      APP_ENVIRONMENT_ONLY: "false"
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: panel
      DB_USERNAME: pterodactyl
      DB_PASSWORD: ${MYSQL_PASSWORD}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_DRIVER: redis
      REDIS_HOST: cache
      MAIL_FROM: admin@dobasmp.net
      MAIL_DRIVER: log
      HASHIDS_LENGTH: 8
    labels:
      maintenant.enable: "true"
      maintenant.group: "games"
      maintenant.name: "Pterodactyl Panel"
      maintenant.update.ignore_major: "true"
    networks:
      - pterodactyl

networks:
  pterodactyl:
    name: pterodactyl
    ipam:
      config:
        - subnet: 10.88.0.0/16
