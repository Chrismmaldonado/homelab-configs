# ntfy self-hosted push notifications (phone alerts for Uptime Kuma & Wazuh).
# Bound to localhost; Caddy fronts it. server.yml holds base-url + APNs upstream.
services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    command: serve
    ports:
      - "127.0.0.1:3007:80"
    volumes:
      - ./cache:/var/cache/ntfy
      - ./etc:/etc/ntfy
      - ntfy_data:/var/lib/ntfy
    environment:
      TZ: America/Chicago
volumes:
  ntfy_data:
